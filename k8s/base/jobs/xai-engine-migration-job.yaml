apiVersion: batch/v1
kind: Job
metadata:
  name: xai-engine-migration-job
  namespace: ibis-x
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c']
        args:
          - |
            echo "Waiting for PostgreSQL to be ready..."
            until nc -z postgresql-service.ibis-x.svc.cluster.local 5432; do
              echo "PostgreSQL is not ready yet..."
              sleep 2
            done
            echo "PostgreSQL is ready!"
      containers:
      - name: xai-migration
        image: ibis-x-xai-engine:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            set -e
            echo "🔄 Démarrage des migrations XAI Engine..."
            cd /app
            echo "📋 État actuel des migrations:"
            alembic current || echo "Aucune migration trouvée"
            echo "🚀 Application des migrations:"
            alembic upgrade head
            echo "✅ Migrations XAI Engine terminées avec succès!"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: xai-engine-secrets
              key: database-url
        - name: PYTHONPATH
          value: "/app"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"