apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
  namespace: ibis-x
type: Opaque
# Placeholder file: real values are injected at `make update-secrets` time
# by scripts/development/update-local-secrets.py, which reads the root .env.
# NEVER commit real base64-encoded secrets here.
data:
  secret-key: REPLACE_WITH_SECRET_KEY
  database-url: REPLACE_WITH_DATABASE_URL
  google-client-id: REPLACE_WITH_GOOGLE_CLIENT_ID
  google-client-secret: REPLACE_WITH_GOOGLE_CLIENT_SECRET
  oauth-redirect-url: REPLACE_WITH_LOCAL_REDIRECT_URL
