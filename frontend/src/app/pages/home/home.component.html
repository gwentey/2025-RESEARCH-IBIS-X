<div class="home-wrapper">
    <div class="container">
    <!-- En-tête -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">
                <img src="assets/images/logos/sorbonne-mini.png" alt="Sorbonne Logo" width="20" height="20">
            </div>
            Ibis X
        </div>
        <button type="button" class="get-started-btn" (click)="startPipeline()">Commencer</button>
    </header>

    <!-- Contenu Principal -->
    <main class="main-content">
        <h1 class="main-title">Ibis X</h1>
        <p class="main-subtitle">L'apprentissage automatique rendu simple et explicable</p>

        <!-- Carte YouTube style tablette -->
        <div class="card-container">
            <div class="youtube-card-wrapper">
                <div class="youtube-card-outer">
                    <div class="youtube-card-inner">
                        <div class="youtube-content">
                            <!-- Conteneur Vidéo YouTube - PLEIN ÉCRAN -->
                            <div class="youtube-video-container">
                                <iframe 
                                    src="https://www.youtube.com/embed/yC3HDRA0kjA?autoplay=0&controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&disablekb=1&fs=1&cc_load_policy=0" 
                                    title="Découvrir IBIS X" 
                                    frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                    allowfullscreen>
                                </iframe>
          </div>
          
                            <!-- Éléments décoratifs autour de la vidéo -->
                            <span class="youtube-decorative-stars" style="top: 10%; left: 5%;">✦</span>
                            <span class="youtube-decorative-stars" style="bottom: 15%; right: 5%;">✦</span>
                            <span class="youtube-decorative-stars" style="top: 8%; right: 8%; font-size: 18px;">✦</span>
                            <span class="youtube-decorative-stars" style="bottom: 10%; left: 10%; font-size: 20px;">✦</span>
                            
                            <div class="youtube-decorative-element" style="width: 60px; height: 60px; top: -20px; left: -20px; opacity: 0.3;"></div>
                            <div class="youtube-decorative-element" style="width: 80px; height: 80px; bottom: -30px; right: -30px; opacity: 0.2;"></div>
                            <div class="youtube-decorative-element" style="width: 40px; height: 40px; top: 50%; left: -15px; opacity: 0.25;"></div>
                            <div class="youtube-decorative-element" style="width: 50px; height: 50px; bottom: 40%; right: -20px; opacity: 0.2;"></div>
                            
                            <!-- Superposition de chargement -->
                            <div class="youtube-loading-overlay">
                                <div class="youtube-loader"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- Éléments décoratifs à l'extérieur de la carte -->
            <div class="decorative-elements">
                <div class="star-1">✨</div>
                <div class="star-2">✨</div>
                <div class="plus-1">+</div>
                
                <!-- Particules flottantes -->
                <div class="particle particle-1"></div>
                <div class="particle particle-2"></div>
                <div class="particle particle-3"></div>
          </div>
        </div>
    </main>
        </div>
</div>
